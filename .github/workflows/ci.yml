name: ci
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: framework + tv2 tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl make git

      - name: Cache Lisp dependencies
        uses: actions/cache@v4
        with:
          path: systems
          key: ocicl-${{ hashFiles('systems.csv') }}

      - name: Install ocicl
        run: |
          git clone --depth 1 https://github.com/ocicl/ocicl.git /tmp/ocicl
          make -C /tmp/ocicl
          sudo make -C /tmp/ocicl install
          ocicl setup > /dev/null 2>&1 || true

      - name: Restore Lisp dependencies
        run: ocicl install

      # tvision-tests.lisp (classic framework, FiveAM) + tv2-sbcl-tests.lisp +
      # tv2-editor-tests.lisp  (make test = test-lisp test-tv2)
      - name: Run tests
        run: make test
